<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập | Hotel</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .field-error {
            color: red;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/headers/app-header :: appHeader}"></div>

    <main class="auth-wrapper">
        <div class="auth-card">
            <h2>Đăng Nhập</h2>
            <p class="subtitle">Vui lòng đăng nhập để quản lý đặt phòng của bạn</p>
            
            <form id="loginForm" method="post" th:action="${url}">
                <div class="form-group full-width" style="margin-bottom: 20px;">
                    <label for="email">Tên tài khoản</label>
                    <input type="email" id="email" name="username" placeholder="Nhập tên đăng nhập" required>
                </div>
                <div class="form-group full-width">
                    <label for="mat_khau_hash">Mật khẩu</label>
                    <input type="password" id="mat_khau_hash" name="password" placeholder="Nhập mật khẩu" required>
                </div>
                <span class="field-error" th:if="${error == 'true'}">Email hoặc mật khẩu không chính xác.</span>
                <button type="submit" class="btn-submit">Đăng Nhập</button>
            </form>

            <div class="auth-footer" th:if="${url != '/nhan-su/login'}">
                <p>Chưa có tài khoản? <a th:href="@{/Register}">Tạo tài khoản mới</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Hotel. All rights reserved.</p>
    </footer>
</body>
</html>
