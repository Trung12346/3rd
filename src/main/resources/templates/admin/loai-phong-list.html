<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Loại Phòng | Hotel</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div th:replace="~{fragments/cms-sidebar :: cmsSidebar}"></div>
<div th:replace="~{fragments/headers/cms-header :: cmsHeader}"></div>
<main class="admin-wrapper">
    <div class="admin-header">
        <h1>Quản Lý Loại Phòng</h1>
        <a th:href="@{/nhan-su/admin/loai-phong}" class="admin-btn outline">Làm Mới Form</a>
    </div>

    <div th:if="${success}" class="admin-message success">
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="admin-message error">
        <span th:text="${error}"></span>
    </div>

    <section class="admin-panel">
        <h2 th:text="${title}">Thêm loại phòng</h2>

        <form th:action="@{/nhan-su/admin/loai-phong/save}" th:object="${loaiPhong}" method="post">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}">

            <div class="admin-grid">
                <div class="admin-field">
                    <label>Tên loại phòng</label>
                    <input type="text" th:field="*{tenLoai}" placeholder="VD: Deluxe" required>
                </div>
                <div class="admin-field">
                    <label>Sức chứa tối đa</label>
                    <input type="number" th:field="*{sucChuaToiDa}" min="1" placeholder="VD: 2" required>
                </div>
                <div class="admin-field">
                    <label>Giá cơ bản (VND)</label>
                    <input type="number" th:field="*{giaCoBan}" min="0" step="1000" placeholder="VD: 1200000" required>
                </div>
                <div class="admin-field full">
                    <label>Mô tả</label>
                    <textarea th:field="*{mota}" placeholder="Nhập mô tả loại phòng..."></textarea>
                </div>
            </div>

            <div class="admin-actions">
                <button type="submit" class="admin-btn">Lưu Loại Phòng</button>
                <a th:href="@{/nhan-su/admin/loai-phong}" class="admin-btn outline">Hủy</a>
            </div>
        </form>
    </section>

    <section class="admin-panel">
        <h2>Danh Sách Loại Phòng</h2>

        <form th:action="@{/nhan-su/admin/loai-phong/tim-kiem}" method="get" class="lp-search-row">
            <div class="lp-search-item">
                <label>Tên loại</label>
                <input type="text" name="keyword" placeholder="Tìm theo tên.." th:value="${keyword}">
            </div>
            <div class="lp-search-item">
                <label>Giá từ</label>
                <input type="number" name="minGia" min="0" step="1000" th:value="${minGia}">
            </div>
            <div class="lp-search-item">
                <label>Giá đến</label>
                <input type="number" name="maxGia" min="0" step="1000" th:value="${maxGia}">
            </div>
            <div class="lp-search-item">
                <label>Sức chứa tối thiểu</label>
                <input type="number" name="soKhach" min="1" th:value="${soKhach}">
            </div>
            <div class="lp-search-actions">
                <button type="submit" class="admin-btn outline">Tìm Kiếm</button>
                <a th:href="@{/nhan-su/admin/loai-phong}" class="admin-btn outline">Xóa Bộ Lọc</a>
            </div>
        </form>

        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>Mã</th>
                    <th>Tên loại</th>
                    <th>Sức chứa</th>
                    <th>Giá cơ bản</th>
                    <th>Mô tả</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="lp : ${loaiPhongs}">
                    <td th:text="${lp.id}"></td>
                    <td><strong th:text="${lp.tenLoai}"></strong></td>
                    <td th:text="${lp.sucChuaToiDa} + ' người'"></td>
                    <td th:text="${#numbers.formatDecimal(lp.giaCoBan, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                    <td th:text="${lp.mota != null ? lp.mota : ''}"></td>
                    <td>
                        <div class="row-actions">
                            <a class="admin-btn small outline"
                               th:href="@{/nhan-su/admin/loai-phong/edit/{id}(id=${lp.id})}">Sửa</a>
                            <a class="admin-btn small danger"
                               th:href="@{/nhan-su/admin/loai-phong/delete/{id}(id=${lp.id})}"
                               onclick="return confirm('Bạn có chắc muốn xóa loại phòng này?')">Xóa</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${loaiPhongs.isEmpty()}">
                    <td colspan="6">
                        <div class="empty-state">Không tìm thấy loại phòng phù hợp.</div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" th:if="${page != null and page.totalPages > 1}">
            <a th:if="${page.hasPrevious()}"
               th:href="@{/nhan-su/admin/loai-phong/tim-kiem(keyword=${keyword}, minGia=${minGia}, maxGia=${maxGia}, soKhach=${soKhach}, page=${page.number - 1}, size=${page.size})}"
               class="admin-btn small outline">&laquo; Trước</a>

            <span th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                <a th:href="@{/nhan-su/admin/loai-phong/tim-kiem(keyword=${keyword}, minGia=${minGia}, maxGia=${maxGia}, soKhach=${soKhach}, page=${i}, size=${page.size})}"
                   th:text="${i + 1}"
                   th:classappend="${i == page.number} ? ' active' : ''"
                   class="admin-btn small outline"></a>
            </span>

            <a th:if="${page.hasNext()}"
               th:href="@{/nhan-su/admin/loai-phong/tim-kiem(keyword=${keyword}, minGia=${minGia}, maxGia=${maxGia}, soKhach=${soKhach}, page=${page.number + 1}, size=${page.size})}"
               class="admin-btn small outline">Sau &raquo;</a>
        </div>
    </section>
</main>

<footer>
    <p>&copy; 2026 Hotel. All rights reserved.</p>
</footer>

</body>
</html>
