<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Nhân Viên | Hotel</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div th:replace="~{fragments/headers/app-header :: appHeader}"></div>

<main class="admin-wrapper">
    <div class="admin-header">
        <h1>Quản Lý Nhân Viên</h1>
        <a th:href="@{/nhan-su/admin/nhan-vien}" class="admin-btn outline">Làm Mới Form</a>
    </div>

    <div th:if="${success}" class="admin-message success">
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="admin-message error">
        <span th:text="${error}"></span>
    </div>

    <section class="admin-panel">
        <h2 th:text="${title}">Thêm nhân viên</h2>

        <form th:action="@{/nhan-su/admin/nhan-vien/save}" th:object="${nhanVien}" method="post">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}">

            <div class="admin-grid">

                <div class="admin-field">
                    <label>Ho ten</label>
                    <input type="text" th:field="*{hoten}" placeholder="VD: Nguyen Van A" >
                </div>

                <div class="admin-field">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" placeholder="example@gmail.com" >
                </div>

                <div class="admin-field" th:if="${nhanVien.id == null}">
                    <label>Mat khau</label>
                    <input type="password"
                           th:field="*{mat_khau_hash}"
                           placeholder="Nhap khi them moi" >
                </div>

                <div class="admin-field" th:if="${nhanVien.id != null}">
                    <label>Mat khau</label>
                    <input type="password"
                           name="matKhaumoi"
                           placeholder="Nhap khi neu muon doi" >
                    <input
                            th:field="*{mat_khau_hash}"
                            th:type="hidden" >
                </div>

                <div class="admin-field">
                    <label>So dien thoai</label>
                    <input type="tel" th:field="*{sdt}" placeholder="09xxxxxxxx" pattern="[0-9]{10}">
                </div>
                <div class="admin-field">
                    <label>mã căn cước công dân</label>
                    <input type="text" inputmode="numeric" th:field="*{maCCCD}" placeholder="0012xxxxxxxx" pattern="[0-9]{12}">
                </div>

                <div class="admin-field">
                    <label>Trang thai</label>
                    <select th:field="*{trang_thai}">
                        <option th:value="true">Hoat dong</option>
                        <option th:value="false">Khoa</option>
                    </select>
                </div>
                <div class="admin-field">
                    <label>Ngày sinh</label>
                    <input type="date" th:field="*{ngaySinh}">
                </div>
                <div class="admin-field full">
                    <label>Dia chi</label>
                    <textarea th:field="*{dia_chi}" placeholder="So nha, duong, tinh/TP..."></textarea>
                </div>
                <div class="admin-field">
                    <label>Bộ phận</label>
                    <input type="text" th:field="*{boPhan}" placeholder="VD: Lễ tân">
                </div>

            </div>

            <div class="admin-actions">
                <button type="submit" class="admin-btn">Lưu Nhân Viên</button>
                <a th:href="@{/nhan-su/admin/nhan-vien}" class="admin-btn outline">Hủy</a>
            </div>
        </form>
    </section>



    <section class="admin-panel">
        <h2>Danh Sách Nhân Viên</h2>

        <form th:action="@{/nhan-su/admin/nhan-vien}" method="get" class="admin-grid" style="margin-bottom:16px;">
            <div class="admin-field">
                <label>Họ tên</label>
                <input type="text" name="hoTen" th:value="${hoTen}" placeholder="Tìm theo họ tên">
            </div>
            <div class="admin-field">
                <label>Email</label>
                <input type="text" name="email" th:value="${email}" placeholder="Tìm theo email">
            </div>
            <div class="admin-field">
                <label>Số điện thoại</label>
                <input type="text" name="sdt" th:value="${sdt}" placeholder="Tìm theo SĐT">
            </div>
            <div class="admin-field">
                <label>Mã CCCD</label>
                <input type="text" name="maCCCD" th:value="${maCCCD}" placeholder="Tìm theo CCCD">
            </div>
            <div class="admin-field">
                <label>Bộ phận</label>
                <input type="text" name="boPhan" th:value="${boPhan}" placeholder="Tìm theo bộ phận">
            </div>
            <div class="admin-field">
                <label>Trạng thái</label>
                <select name="trangThai">
                    <option value="">-- Tất cả --</option>
                    <option value="true" th:selected="${trangThai != null and trangThai == true}">Mở khóa</option>
                    <option value="false" th:selected="${trangThai != null and trangThai == false}">Khóa</option>
                </select>
            </div>
            <div class="admin-field">
                <label>Vai trò</label>
                <select name="maVaiTro">
                    <option value="">-- Tất cả --</option>
                    <option th:each="vt : ${vaiTros}"
                            th:value="${vt.id}"
                            th:text="${vt.tenVaiTro}"
                            th:selected="${maVaiTro != null and maVaiTro == vt.id}">
                    </option>
                </select>
            </div>

            <div class="admin-actions">
                <button type="submit" class="admin-btn outline">Tìm Kiếm</button>
                <a th:href="@{/nhan-su/admin/nhan-vien}" class="admin-btn outline">Xóa Lọc</a>
            </div>
        </form>

        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>Mã</th>
                    <th>Nhân viên</th>
                    <th>Email</th>
                    <th>Số điện thoại</th>
                    <th>mã căn cước công dân</th>
                    <th>ngày sinh</th>
                    <th>địa chỉ</th>
                    <th>vai trò</th>
                    <th>trạng thái</th>
                    <th>Bộ phận</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="nv : ${nhanViens}">
                    <td th:text="${nv.id}"></td>
                    <td><strong th:text="${nv != null ? nv.hoten : ''}"></strong></td>
                    <td th:text="${nv != null ? nv.email : ''}"></td>
                    <td th:text="${nv != null ? nv.sdt : ''}"></td>
                    <td th:text="${nv != null ? nv.maCCCD : ''}"></td>
                    <td th:text="${nv != null ? #temporals.format(nv.ngaySinh, 'dd/MM/yyyy') : ''}"></td>
                    <td th:text="${nv != null ? nv.dia_chi : ''}"></td>
                    <td th:text="${nv != null ? nv.vaitro.tenVaiTro : ''}"></td>
                    <td th:text="${nv.trang_thai == true ? 'mở khóa' : 'khóa'}"></td>
                    <td th:text="${nv.boPhan}"></td>
                    <td>
                        <div class="row-actions">
                            <a class="admin-btn small outline"
                               th:href="@{/nhan-su/admin/nhan-vien/edit/{id}(id=${nv.id})}">Sửa</a>
                            <form th:action="@{/nhan-su/admin/nhan-vien/lock/{id}(id=${nv.id})}"
                                  method="post"
                                  onsubmit="return confirm('Bạn có chắc muốn khóa nhân viên này?')">
                                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="admin-btn small danger">khóa</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${nhanViens.isEmpty()}">
                    <td colspan="11"><div class="empty-state">Không tìm thấy nhân viên phù hợp.</div></td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Phân trang -->
        <div class="admin-actions" th:if="${nhanViensPage.totalPages > 1}" style="justify-content:center; gap:6px;">
            <a th:if="${nhanViensPage.hasPrevious()}"
               class="admin-btn small outline"
               th:href="@{/nhan-su/admin/nhan-vien(page=${nhanViensPage.number - 1}, hoTen=${hoTen}, email=${email}, sdt=${sdt}, maCCCD=${maCCCD}, boPhan=${boPhan}, trangThai=${trangThai}, maVaiTro=${maVaiTro})}">« Trước</a>

            <span th:each="i : ${#numbers.sequence(0, nhanViensPage.totalPages - 1)}">
            <a th:href="@{/nhan-su/admin/nhan-vien(page=${i}, hoTen=${hoTen}, email=${email}, sdt=${sdt}, maCCCD=${maCCCD}, boPhan=${boPhan}, trangThai=${trangThai}, maVaiTro=${maVaiTro})}"
               th:text="${i + 1}"
               th:classappend="${i == nhanViensPage.number} ? ' active'"
               class="admin-btn small outline">
            </a>
        </span>

            <a th:if="${nhanViensPage.hasNext()}"
               class="admin-btn small outline"
               th:href="@{/nhan-su/admin/nhan-vien(page=${nhanViensPage.number + 1}, hoTen=${hoTen}, email=${email}, sdt=${sdt}, maCCCD=${maCCCD}, boPhan=${boPhan}, trangThai=${trangThai}, maVaiTro=${maVaiTro})}">Sau »</a>
        </div>
    </section>
</main>

<footer>
    <p>&copy; 2026 Hotel. All rights reserved.</p>
</footer>

</body>

</html>
